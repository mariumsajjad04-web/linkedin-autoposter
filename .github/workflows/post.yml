name: LinkedIn Auto Post

on:
  schedule:
    # Peak hours — times in UTC (India is UTC+5:30)
    # 8:00 AM IST  = 2:30 AM UTC  → rounded to 2:30
    # 12:00 PM IST = 6:30 AM UTC  → rounded to 6:30
    # 6:00 PM IST  = 12:30 PM UTC → rounded to 12:30
    - cron: '30 2 * * 1-5'   # 8:00 AM IST, Mon–Fri
    - cron: '30 6 * * 1-5'   # 12:00 PM IST, Mon–Fri
    - cron: '30 12 * * 1-5'  # 6:00 PM IST, Mon–Fri
  workflow_dispatch:  # lets you trigger manually from GitHub UI

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and post to LinkedIn
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_REFRESH_TOKEN: ${{ secrets.LINKEDIN_REFRESH_TOKEN }}
          LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
          LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
          LINKEDIN_NICHE: ${{ secrets.LINKEDIN_NICHE }}
          LINKEDIN_PERSON_ID: ${{ secrets.LINKEDIN_PERSON_ID }}
          LINKEDIN_TOPICS: ${{ secrets.LINKEDIN_TOPICS }}
        run: python main.py
